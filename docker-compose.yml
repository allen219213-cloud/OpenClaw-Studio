services:
  backend:
    build:
      context: ./backend
    container_name: lobster-claw-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    container_name: lobster-claw-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws/status
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
